<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>链上众筹系统</title><link rel="stylesheet" href="./css/style.css"></head><body>
<header class="topbar"><div><p class="eyebrow">Blockchain Crowdfunding DApp</p><h1>链上众筹系统</h1></div><nav class="topnav"><a class="nav-link active" href="./index.html">项目操作</a><a class="nav-link" href="./dashboard.html">系统总览</a><a class="nav-link" href="./my.html">我的项目</a><a class="nav-link" href="./events.html">链上事件</a><a class="nav-link" href="./rewards.html">奖励中心</a><button id="connect" class="button primary">连接钱包</button></nav></header>
<main class="layout"><aside class="sidebar"><section class="panel wallet"><h2>运行状态</h2><dl><dt>账户</dt><dd id="account">未连接</dd><dt>网络</dt><dd id="network">未连接</dd><dt>合约</dt><dd id="contract">未加载</dd></dl></section><section class="panel"><h2>创建项目</h2><form id="createForm" class="form-stack"><label>项目名称<input name="projectName" required placeholder="校园公益图书角"></label><label>项目描述<textarea name="description" rows="4" required></textarea></label><label>项目分类<select name="category"><option>公益</option><option>校园</option><option>技术</option><option>创意</option><option>其他</option></select></label><label>封面 URL<input name="image" type="url"></label><label>目标金额 ETH<input name="goal" type="number" min="0.001" step="0.001" required value="1"></label><label>截止时间<input id="deadline" name="deadline" type="datetime-local" required></label><button class="button primary full">创建众筹项目</button></form></section></aside><section class="content"><div class="section-head"><div><p class="eyebrow">Projects</p><h2>众筹项目列表</h2></div><button id="refresh" class="button">刷新</button></div><section class="summary"><div><span>项目总数</span><strong id="summaryTotal">0</strong></div><div><span>进行中</span><strong id="summaryActive">0</strong></div><div><span>成功</span><strong id="summarySuccess">0</strong></div><div><span>失败</span><strong id="summaryFailed">0</strong></div><div><span>累计筹集</span><strong id="summaryRaised">0 ETH</strong></div></section><div class="tools"><input id="search" type="search" placeholder="搜索名称或项目 ID"><select id="statusFilter"><option value="all">全部状态</option><option value="0">进行中</option><option value="1">成功</option><option value="2">失败</option><option value="3">已取消</option></select><select id="projectSort"><option value="newest">创建顺序：新到旧</option><option value="oldest">创建顺序：旧到新</option><option value="raised">已筹金额：高到低</option><option value="progress">完成度：高到低</option><option value="deadline">截止时间：近到远</option></select></div><div id="projects" class="project-list"><div class="empty">连接钱包后加载项目</div></div></section></main>
<section class="log-panel"><div class="section-head"><h2>交易反馈</h2><button id="clearLog" class="button">清空</button></div><ol id="log"></ol></section><script type="module" src="./js/app.js"></script></body></html>
